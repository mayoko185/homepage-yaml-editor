<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage YAML Editor</title>
    <link rel="icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
    <link rel="stylesheet" href="styles.css?v=28">
    <script src="runtime-config.js"></script>
    <script>
        if (window.APP_CONFIG && window.APP_CONFIG.defaultTheme === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>
<body>
    <div class="floating-nav" id="floating-nav">
        <button type="button" id="scroll-top-button" class="floating-nav-button" onclick="scrollToTop()" aria-label="Back to top" title="Back to top" hidden>
            <span class="floating-nav-icon" aria-hidden="true">&uarr;</span>
            <span>Top</span>
        </button>
        <button type="button" class="floating-nav-button" onclick="scrollToEditor()" aria-label="Jump to YAML editor" title="Jump to YAML editor">
            <span class="floating-nav-icon" aria-hidden="true">&#9998;</span>
            <span>Editor</span>
        </button>
        <button type="button" class="floating-nav-button" onclick="scrollToPreview()" aria-label="Jump to homepage preview" title="Jump to homepage preview">
            <span class="floating-nav-icon" aria-hidden="true">&darr;</span>
            <span>Preview</span>
        </button>
    </div>
    <div class="container">
        <header class="page-header">
            <h1>Homepage YAML Editor</h1>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">Switch to Light Mode</button>
                <form method="post" action="/logout" id="logout-form" hidden>
                    <button type="submit" class="logout-button">Logout</button>
                </form>
            </div>
        </header>

        <section class="notification-area" aria-label="Application notifications">
            <p id="directory-info" class="directory-status">No directory loaded.</p>
            <p id="unsaved-status" class="unsaved-status" role="status" aria-live="polite" hidden></p>
            <div id="save-status" class="save-status" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        </section>
        
        <div class="controls" id="sample-controls">
            <button id="reset-sample-button" onclick="resetToSample()">Reset to Sample</button>
        </div>
        <div class="config-tabs">

            <div class="tab active" data-tab="services" onclick="switchTab('services', event)">Services</div>
            <div class="tab" data-tab="settings" onclick="switchTab('settings', event)">Settings</div>
            <div class="tab" data-tab="bookmarks" onclick="switchTab('bookmarks', event)">Bookmarks</div>
            <div class="tab" data-tab="widgets" onclick="switchTab('widgets', event)">Widgets</div>
        </div>
        
        <div class="editor-section" id="yaml-editor-section">
            <div class="editor-toolbar" role="toolbar" aria-label="YAML editor tools">
                <div class="toolbar-group">
                    <label class="toolbar-toggle" title="Automatically indent new YAML lines">
                        <input type="checkbox" id="auto-indent-toggle" checked>
                        <span class="toolbar-button-icon auto-indent-icon" aria-hidden="true">&#8677;</span>
                        <span>Auto Indent</span>
                    </label>
                    <button type="button" id="toggle-comment-button" class="toolbar-button" title="Toggle comment (Ctrl+/)">
                        <span class="toolbar-button-icon" aria-hidden="true">#</span>
                        <span>Toggle Comment</span>
                    </button>
                    <button type="button" id="jump-section-button" class="toolbar-button" title="Jump to the matching section in Settings">
                        <span class="toolbar-button-icon" aria-hidden="true">&#8644;</span>
                        <span id="jump-section-label">Jump to Settings</span>
                    </button>
                </div>
                <div class="toolbar-group toolbar-file-actions" aria-label="Configuration file actions">
                    <button type="button" id="save-config-button" class="toolbar-button toolbar-action-button" onclick="saveConfig()" title="Save all changed configurations">
                        <span class="toolbar-button-icon" aria-hidden="true">&#10003;</span>
                        <span>Save</span>
                    </button>
                    <button type="button" class="toolbar-button toolbar-action-button" onclick="handleLoadDirectory()" title="Load a configuration directory">
                        <span class="toolbar-button-icon" aria-hidden="true">&#8613;</span>
                        <span>Load</span>
                    </button>
                    <button type="button" id="reload-directory-button" class="toolbar-button toolbar-action-button" onclick="reloadCurrentDirectory()" title="Reload the current directory" hidden>
                        <span class="toolbar-button-icon" aria-hidden="true">&#8635;</span>
                        <span>Reload</span>
                    </button>
                    <button type="button" class="toolbar-button toolbar-action-button" onclick="downloadAllConfigs()" title="Download all configurations">
                        <span class="toolbar-button-icon" aria-hidden="true">&#8681;</span>
                        <span>Download</span>
                    </button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea id="yaml-editor" spellcheck="false"></textarea>
            </div>
        </div>
        
        <div class="preview-section homepage-preview" id="homepage-preview-section">
            <div class="preview-header">
                <div class="preview-title">Homepage Preview</div>
                <button class="refresh-btn" onclick="refreshPreview()">Refresh Preview</button>
            </div>
            <div id="visual-preview"></div>
        </div>
        
    </div>

    <!-- Modal for directory path input -->
    <div id="directoryModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Load Configuration Directory</h3>
                <span onclick="closeDirectoryModal()" style="cursor: pointer; font-size: 24px;">&times;</span>
            </div>
            <p>Enter the server path containing your Homepage YAML files:</p>
            <input type="text" id="serverPathInput" placeholder="/path/to/configs" class="modal-input" />
            <div style="display: flex; justify-content: space-between;">
                <button onclick="closeDirectoryModal()" class="modal-button">Cancel</button>
                <button onclick="loadFromServerPath()" class="modal-button">Load</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.min.js"></script>
    <script src="app.js?v=18"></script>
</body>
</html>
