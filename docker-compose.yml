services:
  homepage-editor:
    image: docker.io/mayoko185/homepage-yaml-editor:latest
    ports:
      - 127.0.0.1:8081:8081
    environment:
      - PUID=1000
      - PGID=1000
      - DEFAULT_THEME=dark
      # Uncomment both values to require the matching login credentials.
      # - REQUIRE_LOGIN_USER=admin
      # - REQUIRE_LOGIN_PASSWORD=change-this-password
      - AUTOLOAD_DIR=/hp_config
    volumes:
      - /opt/stacks/homepage/config:/hp_config
      - ./data:/app/data
    restart: unless-stopped
