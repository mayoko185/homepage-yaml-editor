services:
  homepage-editor:
    image: docker.io/mayoko185/homepage-yaml-editor:v59
    ports:
      - 8081:8081
    environment:
      - PUID=1000
      - PGID=1000
      - DEFAULT_THEME=dark
      # Uncomment both values to require the matching login credentials.
      # - require_login_user=admin
      # - require_login_password=change-this-password
      - AUTOLOAD_DIR=/hp_config
    volumes:
      - /opt/stacks/homepage/config:/hp_config
      - ./data:/app/data
    restart: unless-stopped
